apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deploy-guard
  namespace: demo
rules:
  # Read deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Execute rollbacks
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
  # Read pods (needed for status and restart checking)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read replicasets (needed for rollback history and target resolution)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
