{{- if .Values.rbac.create -}}
{{- $root := . -}}
{{- range .Values.watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "deploy-guard.fullname" $root }}
  namespace: {{ . }}
  labels:
    {{- include "deploy-guard.labels" $root | nindent 4 }}
rules:
  # Read deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # Execute rollbacks
  - apiGroups: ["apps"]
    resources: ["deployments/rollback", "deployments"]
    verbs: ["patch", "update"]
  # Read pods (needed for status and restart checking)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read replicasets (needed for rollback history and target resolution)
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "deploy-guard.fullname" $root }}
  namespace: {{ . }}
  labels:
    {{- include "deploy-guard.labels" $root | nindent 4 }}
roleRef:
  kind: Role
  name: {{ include "deploy-guard.fullname" $root }}
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: {{ include "deploy-guard.serviceAccountName" $root }}
    namespace: {{ $root.Release.Namespace }}
{{- end }}
{{- end }}
